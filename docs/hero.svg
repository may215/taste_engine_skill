<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b8a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="600" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- RL Loop: central arc arrows -->
  <!-- Outer arc (reinforcement loop) -->
  <path d="M 200 370 C 200 500, 500 540, 700 500 C 900 460, 1000 370, 1000 270" stroke="url(#accent)" stroke-width="3" stroke-dasharray="8 6" fill="none" opacity="0.4"/>
  <path d="M 1000 270 C 1000 170, 900 80, 600 60 C 300 40, 200 120, 200 220" stroke="url(#accent)" stroke-width="3" stroke-dasharray="8 6" fill="none" opacity="0.4"/>

  <!-- Arrow heads on the loop -->
  <polygon points="1000,270 985,260 990,278" fill="#e94560" opacity="0.6"/>
  <polygon points="200,220 215,210 210,228" fill="#e94560" opacity="0.6"/>

  <!-- Center glow -->
  <ellipse cx="600" cy="300" rx="180" ry="80" fill="url(#glow)" opacity="0.15"/>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#fff" letter-spacing="6">TASTE ENGINE</text>
  <text x="600" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#8888aa" letter-spacing="8" text-transform="uppercase">CONTINUOUS REINFORCEMENT LEARNING FOR CLAUDE CODE</text>

  <!-- Decorative line under title -->
  <rect x="450" y="130" width="300" height="2" fill="url(#accent)" opacity="0.5"/>

  <!-- Node 1: Editor (top-left) -->
  <rect x="120" y="200" width="140" height="50" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#aabbdd">✏️  Editor</text>

  <!-- Node 2: Diff (top-center) -->
  <rect x="330" y="140" width="140" height="50" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#aabbdd">🔄  Diff</text>

  <!-- Node 3: Classifiers (top-right) -->
  <rect x="540" y="100" width="160" height="50" rx="8" fill="url(#accent2)" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#88ddff">🧠 40 Classifiers</text>

  <!-- Node 4: Memory (right) -->
  <rect x="780" y="140" width="140" height="50" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="850" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#aabbdd">💾  Memory</text>

  <!-- Node 5: Injector (bottom-right) -->
  <rect x="940" y="280" width="140" height="50" rx="8" fill="url(#accent2)" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1010" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#88ddff">💉  Inject</text>

  <!-- Node 6: Context (bottom-center) -->
  <rect x="700" y="420" width="160" height="50" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="780" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#aabbdd">📄  Context</text>

  <!-- Node 7: Model (bottom-left) -->
  <rect x="500" y="480" width="140" height="50" rx="8" fill="url(#accent2)" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#88ddff">🤖  Claude</text>

  <!-- Node 8: Output (bottom-left) -->
  <rect x="300" y="500" width="140" height="50" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#aabbdd">⚡  Output</text>

  <!-- Connecting arrows between nodes -->
  <!-- Editor → Diff -->
  <line x1="260" y1="225" x2="320" y2="165" stroke="#0f3460" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- Diff → Classifiers -->
  <line x1="470" y1="165" x2="530" y2="125" stroke="#0f3460" stroke-width="2"/>
  <polygon points="535,123 525,118 525,128" fill="#0f3460"/>
  <!-- Classifiers → Memory -->
  <line x1="700" y1="125" x2="770" y2="160" stroke="#0f3460" stroke-width="2"/>
  <polygon points="775,162 765,155 767,167" fill="#0f3460"/>
  <!-- Memory → Injector -->
  <line x1="850" y1="195" x2="980" y2="275" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <polygon points="983,277 973,270 975,282" fill="#e94560" opacity="0.6"/>
  <!-- Injector → Context -->
  <line x1="980" y1="330" x2="830" y2="420" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <polygon points="826,422 836,415 834,427" fill="#e94560" opacity="0.6"/>
  <!-- Context → Model -->
  <line x1="700" y1="445" x2="650" y2="478" stroke="#0f3460" stroke-width="2"/>
  <polygon points="645,480 655,473 653,485" fill="#0f3460"/>
  <!-- Model → Output -->
  <line x1="500" y1="505" x2="450" y2="520" stroke="#0f3460" stroke-width="2"/>
  <polygon points="445,521 455,514 453,526" fill="#0f3460"/>
  <!-- Output → Editor (feedback loop) -->
  <path d="M 300 525 Q 200 500, 190 260" stroke="url(#accent)" stroke-width="2.5" stroke-dasharray="6 4" fill="none" opacity="0.7"/>
  <polygon points="190,255 180,262 198,263" fill="#e94560"/>

  <!-- Decorative: floating code snippets -->
  <g opacity="0.06">
    <text x="180" y="380" font-family="monospace" font-size="11" fill="#0f3460">&lt;ErrorBoundary fallback={...}&gt;</text>
    <text x="350" y="360" font-family="monospace" font-size="11" fill="#0f3460">const fn = () =&gt; {}</text>
    <text x="550" y="340" font-family="monospace" font-size="11" fill="#0f3460">user?.name ?? 'Guest'</text>
    <text x="750" y="320" font-family="monospace" font-size="11" fill="#0f3460">import { X } from './y'</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="575" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555577" letter-spacing="3">WRITE CODE · THE AI LEARNS · YOU KEEP YOUR STYLE</text>
</svg>
